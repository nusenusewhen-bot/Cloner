<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Cloner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #5865f2, #eb459e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #b9bbbe;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #5865f2;
        }
        button {
            width: 100%;
            padding: 18px;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }
        button:hover { background: #4752c4; }
        button:disabled { background: #333; cursor: not-allowed; }
        .status {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            background: #1a1a1a;
            border-left: 4px solid #5865f2;
            display: none;
        }
        .status.show { display: block; }
        .status.error { border-left-color: #ed4245; }
        .status.success { border-left-color: #3ba55d; }
        .log-container {
            margin-top: 30px;
            background: #0f0f0f;
            border-radius: 12px;
            border: 1px solid #333;
            max-height: 500px;
            display: flex;
            flex-direction: column;
        }
        .log-header {
            padding: 15px 20px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            border-radius: 12px 12px 0 0;
            font-weight: bold;
            color: #3ba55d;
        }
        .log-content {
            overflow-y: auto;
            padding: 15px;
            max-height: 400px;
        }
        .log-entry {
            padding: 10px 15px;
            margin: 5px 0;
            background: #1a1a1a;
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            border-left: 3px solid #5865f2;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .log-entry.error { border-left-color: #ed4245; }
        .log-entry.success { border-left-color: #3ba55d; }
        .log-entry.info { border-left-color: #faa61a; }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #5865f2, #eb459e);
            width: 0%;
            transition: width 0.3s;
        }
        .options {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .option-row {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #333;
        }
        .option-row:last-child { border-bottom: none; }
        .option-row input[type="checkbox"] {
            width: auto;
            margin-right: 12px;
            cursor: pointer;
        }
        .option-row label {
            margin: 0;
            text-transform: none;
            font-size: 14px;
            cursor: pointer;
            flex: 1;
        }
        .option-all {
            background: #5865f2;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        .option-all label { color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 Server Cloner</h1>
        
        <div class="form-group">
            <label>Discord Token</label>
            <input type="password" id="token" placeholder="Enter your Discord token...">
        </div>
        
        <div class="form-group">
            <label>Source Server ID (Copy From)</label>
            <input type="text" id="source" placeholder="Server ID to copy...">
        </div>
        
        <div class="form-group">
            <label>Target Server ID (Copy To)</label>
            <input type="text" id="target" placeholder="Server ID to clone into...">
        </div>

        <div class="options">
            <div class="option-row option-all">
                <input type="checkbox" id="optAll" checked onchange="toggleAll()">
                <label for="optAll">🎯 Clone All</label>
            </div>
            <div class="option-row">
                <input type="checkbox" id="optBanner" class="optItem" checked>
                <label for="optBanner">🎨 Banner</label>
            </div>
            <div class="option-row">
                <input type="checkbox" id="optIcon" class="optItem" checked>
                <label for="optIcon">🖼️ Server Icon/Logo</label>
            </div>
            <div class="option-row">
                <input type="checkbox" id="optChannels" class="optItem" checked>
                <label for="optChannels">📁 Channels & Categories</label>
            </div>
            <div class="option-row">
                <input type="checkbox" id="optRoles" class="optItem" checked>
                <label for="optRoles">🎭 Roles</label>
            </div>
        </div>
        
        <button onclick="startClone()" id="btn">Start Cloning</button>
        
        <div class="status" id="status">
            <div id="statusText">Starting...</div>
            <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        </div>
        
        <div class="log-container" id="logContainer" style="display: none;">
            <div class="log-header">📋 Activity Log</div>
            <div class="log-content" id="logs"></div>
        </div>
    </div>

    <script>
        let ws = null;
        let currentId = null;
        let pollInterval = null;
        let wsConnected = false;

        function connectWS() {
            try {
                ws = new WebSocket(`wss://${window.location.host}/ws`);
                
                ws.onopen = () => {
                    wsConnected = true;
                    console.log('WS connected');
                };
                
                ws.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    handleMessage(data);
                };
                
                ws.onerror = () => {
                    wsConnected = false;
                };
                
                ws.onclose = () => {
                    wsConnected = false;
                    setTimeout(connectWS, 3000);
                };
            } catch(e) {
                wsConnected = false;
            }
        }

        connectWS();

        function handleMessage(data) {
            if (data.type === 'log' && data.id === currentId) {
                addLog(data.message);
            } else if (data.type === 'status' && data.id === currentId) {
                updateStatus(data.status);
            } else if (data.type === 'complete' && data.id === currentId) {
                stopPolling();
                document.getElementById('status').className = 'status show success';
                document.getElementById('statusText').textContent = '✅ Clone Complete!';
                document.getElementById('progress').style.width = '100%';
                document.getElementById('btn').disabled = false;
            } else if (data.type === 'error' && data.id === currentId) {
                stopPolling();
                document.getElementById('status').className = 'status show error';
                document.getElementById('statusText').textContent = '❌ Error: ' + data.message;
                document.getElementById('btn').disabled = false;
            }
        }

        function toggleAll() {
            const allChecked = document.getElementById('optAll').checked;
            document.querySelectorAll('.optItem').forEach(cb => cb.checked = allChecked);
        }

        document.querySelectorAll('.optItem').forEach(cb => {
            cb.addEventListener('change', () => {
                const all = document.querySelectorAll('.optItem');
                const checked = document.querySelectorAll('.optItem:checked');
                document.getElementById('optAll').checked = all.length === checked.length;
            });
        });

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                if (!currentId || wsConnected) return;
                try {
                    const res = await fetch(`/api/session/${currentId}`);
                    const data = await res.json();
                    if (data.logs) {
                        const logsDiv = document.getElementById('logs');
                        const currentLogs = Array.from(logsDiv.children).map(c => c.textContent);
                        data.logs.forEach(log => {
                            if (!currentLogs.includes(log)) addLog(log);
                        });
                    }
                    if (data.status === 'completed') {
                        stopPolling();
                        document.getElementById('status').className = 'status show success';
                        document.getElementById('statusText').textContent = '✅ Clone Complete!';
                        document.getElementById('progress').style.width = '100%';
                        document.getElementById('btn').disabled = false;
                    } else if (data.status === 'error') {
                        stopPolling();
                        document.getElementById('status').className = 'status show error';
                        document.getElementById('statusText').textContent = '❌ Error occurred';
                        document.getElementById('btn').disabled = false;
                    }
                } catch(e) {}
            }, 1000);
        }

        function stopPolling() {
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
        }
        
        function addLog(msg) {
            const logs = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            if (msg.includes('✅') || msg.includes('🎉')) entry.classList.add('success');
            else if (msg.includes('❌') || msg.includes('💥')) entry.classList.add('error');
            else if (msg.includes('⚠️')) entry.classList.add('info');
            
            entry.textContent = msg;
            logs.insertBefore(entry, logs.firstChild);
        }
        
        function updateStatus(status) {
            const statusText = document.getElementById('statusText');
            const progress = document.getElementById('progress');
            
            if (status === 'deleting') {
                statusText.textContent = '🗑️ Deleting old content...';
                progress.style.width = '25%';
            } else if (status === 'cloning') {
                statusText.textContent = '📋 Cloning server...';
                progress.style.width = '60%';
            }
        }
        
        async function startClone() {
            const token = document.getElementById('token').value;
            const source = document.getElementById('source').value;
            const target = document.getElementById('target').value;
            
            if (!token || !source || !target) {
                alert('Fill all fields');
                return;
            }

            const options = {
                banner: document.getElementById('optBanner').checked,
                icon: document.getElementById('optIcon').checked,
                channels: document.getElementById('optChannels').checked,
                roles: document.getElementById('optRoles').checked
            };
            
            document.getElementById('btn').disabled = true;
            document.getElementById('status').className = 'status show';
            document.getElementById('statusText').textContent = '🔑 Connecting...';
            document.getElementById('progress').style.width = '10%';
            document.getElementById('logContainer').style.display = 'flex';
            document.getElementById('logs').innerHTML = '';
            
            try {
                const res = await fetch('/api/clone', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, sourceGuild: source, targetGuild: target, options })
                });
                
                const data = await res.json();
                if (data.error) {
                    document.getElementById('status').className = 'status show error';
                    document.getElementById('statusText').textContent = '❌ ' + data.error;
                    document.getElementById('btn').disabled = false;
                } else {
                    currentId = data.id;
                    addLog('🚀 Clone started - ID: ' + data.id);
                    startPolling();
                }
            } catch (e) {
                document.getElementById('status').className = 'status show error';
                document.getElementById('statusText').textContent = '❌ Request failed: ' + e.message;
                document.getElementById('btn').disabled = false;
            }
        }
    </script>
</body>
</html>
