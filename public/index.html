<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Cloner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            padding: 40px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #5865f2, #eb459e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #b9bbbe;
            font-size: 14px;
            text-transform: uppercase;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #5865f2;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #4752c4; }
        button:disabled { background: #333; cursor: not-allowed; }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #1a1a1a;
            border-left: 3px solid #5865f2;
            display: none;
        }
        .status.show { display: block; }
        .status.error { border-left-color: #ed4245; }
        .status.success { border-left-color: #3ba55d; }
        .log {
            margin-top: 30px;
            max-height: 300px;
            overflow-y: auto;
            background: #0f0f0f;
            border-radius: 8px;
            padding: 15px;
        }
        .log-entry {
            padding: 8px;
            margin: 5px 0;
            background: #1a1a1a;
            border-radius: 4px;
            font-size: 13px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 Server Cloner</h1>
        
        <div class="form-group">
            <label>Discord Token</label>
            <input type="password" id="token" placeholder="Enter your Discord token...">
        </div>
        
        <div class="form-group">
            <label>Source Server ID (Copy From)</label>
            <input type="text" id="source" placeholder="Server ID to copy...">
        </div>
        
        <div class="form-group">
            <label>Target Server ID (Copy To)</label>
            <input type="text" id="target" placeholder="Server ID to clone into...">
        </div>
        
        <button onclick="startClone()" id="btn">Start Cloning</button>
        
        <div class="status" id="status"></div>
        
        <div class="log" id="log"></div>
    </div>

    <script>
        const ws = new WebSocket(`ws://${window.location.host}`);
        const log = document.getElementById('log');
        
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            addLog(`${data.type}: ${data.step || data.message || ''}`);
            
            if (data.type === 'complete') {
                document.getElementById('status').className = 'status show success';
                document.getElementById('status').textContent = '✅ Clone Complete!';
                document.getElementById('btn').disabled = false;
            } else if (data.type === 'error') {
                document.getElementById('status').className = 'status show error';
                document.getElementById('status').textContent = '❌ Error: ' + data.message;
                document.getElementById('btn').disabled = false;
            }
        };
        
        function addLog(msg) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            log.insertBefore(entry, log.firstChild);
        }
        
        async function startClone() {
            const token = document.getElementById('token').value;
            const source = document.getElementById('source').value;
            const target = document.getElementById('target').value;
            
            if (!token || !source || !target) {
                document.getElementById('status').className = 'status show error';
                document.getElementById('status').textContent = 'Fill all fields';
                return;
            }
            
            document.getElementById('btn').disabled = true;
            document.getElementById('status').className = 'status show';
            document.getElementById('status').textContent = 'Starting...';
            
            try {
                const res = await fetch('/api/clone', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, sourceGuild: source, targetGuild: target })
                });
                
                const data = await res.json();
                if (data.error) {
                    document.getElementById('status').className = 'status show error';
                    document.getElementById('status').textContent = '❌ ' + data.error;
                    document.getElementById('btn').disabled = false;
                }
            } catch (e) {
                document.getElementById('status').className = 'status show error';
                document.getElementById('status').textContent = '❌ Request failed';
                document.getElementById('btn').disabled = false;
            }
        }
    </script>
</body>
</html>
